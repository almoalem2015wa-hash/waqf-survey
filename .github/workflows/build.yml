name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Build APK
        run: |
          cordova create WaqfApp com.waqf.survey "WaqfSurvey"
          cp index.html WaqfApp/www/index.html

          cat > WaqfApp/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.waqf.survey" version="1.0.0"
            xmlns="http://www.w3.org/ns/widgets"
            xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>WaqfSurvey</name>
            <content src="index.html" />
            <access origin="*" />
            <allow-navigation href="*" />
            <allow-intent href="*" />
            <platform name="android">
              <preference name="android-minSdkVersion" value="24" />
              <preference name="android-targetSdkVersion" value="34" />
              <preference name="GradleVersion" value="8.2" />
              <preference name="AndroidGradlePluginVersion" value="8.2.0" />
            </platform>
            <preference name="EnableViewportScale" value="true" />
          </widget>
          XMLEOF

          cd WaqfApp
          cordova platform add android@13
          cordova build android -- --packageType=apk

      - uses: actions/upload-artifact@v4
        with:
          name: WaqfSurvey-APK
          path: WaqfApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
